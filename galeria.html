<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestros Momentos ❤️</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
    <link rel="stylesheet" href="galeria.css">
</head>
<body>
    <button id="music-btn" class="c-music-btn">🎵</button>

    <main class="hero portfolio3D" id="heroMain">
        
    <main class="hero portfolio3D" id="heroMain">
        <header class="hero-portfolio--header">
            <h1 class="hero-portfolio--header-intro">❤️Nuestros Momentos❤️</h1>
        </header>

        <article class="hero-portfolio--grid">
            <div class="hero-portfolio--grid-item c-card">
                <img class="c-card--image" src="img/Uno.jpeg" alt="Foto 1">
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <video class="c-card--image" src="img/Cuatro.mp4" autoplay muted loop playsinline></video>
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <img class="c-card--image" src="img/Cinco.jpeg" alt="Foto 2">
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <video class="c-card--image" src="img/Diez.mp4" autoplay muted loop playsinline></video>
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <img class="c-card--image" src="img/Dos.jpeg" alt="Foto 3">
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <video class="c-card--image" src="img/Nueve.mp4" autoplay muted loop playsinline></video>
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <img class="c-card--image" src="img/Ocho.jpeg" alt="Foto 4">
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <video class="c-card--image" src="img/Tres.mp4" autoplay muted loop playsinline></video>
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <img class="c-card--image" src="img/Seis.jpeg" alt="Foto 5">
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <video class="c-card--image" src="img/Once.mp4" autoplay muted loop playsinline></video>
            </div>
            <div class="hero-portfolio--grid-item c-card">
                <img class="c-card--image" src="img/Siete.jpeg" alt="Foto 6">
            </div>
        </article>
    </main>

    <script src="galeria.js"></script>
</body>
</html>
